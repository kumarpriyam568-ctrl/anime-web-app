<!DOCTYPE html>
<html>
<head>
    <title>Anime Recommender 🎌</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #111;
            color: white;
        }
        input, button {
            padding: 10px;
            margin: 10px;
        }
        .anime {
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>🎌 Anime Recommender 🎌</h1>

    <form method="POST">
        <input type="text" name="mood" placeholder="Enter mood (action, romance...)" required>
        <br>
        <button type="submit">Recommend</button>
    </form>

    <div class="anime">
        {% for anime in recommendations %}
            <p>👉 {{ anime }}</p>
        {% endfor %}
    </div>

</body>
</html>
