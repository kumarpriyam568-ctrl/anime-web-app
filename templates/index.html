<!DOCTYPE html>
<html>
<head>
    <title>Anime Recommender 🎌</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0f0f, #1f1f2e);
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 50px;
            font-size: 40px;
            color: #ff4b2b;
        }

        form {
            margin-top: 30px;
        }

        input {
            padding: 12px;
            width: 250px;
            border: none;
            border-radius: 25px;
            outline: none;
            font-size: 16px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            background: #ff4b2b;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #ff1e00;
        }

        .card {
            background: #1c1c2b;
            margin: 20px auto;
            padding: 15px;
            width: 300px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(255,75,43,0.5);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .result {
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <h1>🎌 Anime Recommender</h1>

    <form method="POST">
        <input type="text" name="mood" placeholder="Enter mood (action, romance...)" required>
        <br><br>
        <button type="submit">Find Anime 🔍</button>
    </form>

    <div class="result">
        {% for anime in recommendations %}
            <div class="card">
                <h3>{{ anime }}</h3>
            </div>
        {% endfor %}
    </div>

</body>
</html>
